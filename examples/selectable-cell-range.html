<!doctype html>

<html>
  <head>
    <title>Tabulator Test</title>
    <link rel="stylesheet" href="./_examples.css" />
  </head>
  <body>
    <div id="example-table"></div>

    <script type="module">
      import { generateData } from './_exampleData.js'
      import { initializeTestPage, loadExampleTabulator } from './_exampleUtils.js'

      await initializeTestPage()
      const Tabulator = await loadExampleTabulator()

      window.table = new Tabulator('#example-table', {
        data: generateData(), //assign data to table
        height: 600,
        selectableRange: 1, //allow only one range at a time
        selectableRangeColumns: true,
        selectableRangeRows: true,
        selectableRangeClearCells: true,
        columnDefaults: {
          headerSort: false
        },
        columns: [
          { title: 'Id', field: 'id' },
          { title: 'Name', field: 'name' },
          { title: 'Age', field: 'age', hozAlign: 'right' },
          { title: 'Gender', field: 'gender' },
          { title: 'Rating', field: 'rating', formatter: 'star', hozAlign: 'center' },
          { title: 'Color', field: 'col' },
          { title: 'DoB', field: 'dob', hozAlign: 'center' },
          { title: 'Salary', field: 'salary', sorter: 'number', hozAlign: 'right' },
          { title: 'Address', field: 'address' },
          { title: 'State', field: 'state' },
          { title: 'Zip Code', field: 'zip' },
          { title: 'Progress', field: 'progress', formatter: 'progress' },
          { title: 'Completed', field: 'completed', formatter: 'tickCross', hozAlign: 'center' }
        ]
      })
    </script>
  </body>
</html>
