<!doctype html>

<html>
  <head>
    <title>Tabulator Test</title>
    <link rel="stylesheet" href="./_examples.css" />
  </head>
  <body>
    <div id="example-table"></div>

    <script type="module">
      import { TabulatorFull as Tabulator } from './../../dist/js/esm/tabulator.js'
      import { initializeTestPage } from './_exampleUtils.js'

      // Generate and log the data
      const tableData = initializeTestPage()

      window.table = new Tabulator('#example-table', {
        data: tableData, //assign data to table
        height: 600,
        layout: 'fitColumns',
        responsiveLayout: 'hide',
        columnDefaults: {
          headerSortTristate: true,
          minWidth: 50
        },
        columns: [
          { title: 'Id', field: 'id', width: 80, responsive: 0 },
          { title: 'Name', field: 'name', sorter: 'string', width: 170 },
          { title: 'Age', field: 'age', sorter: 'number', hozAlign: 'right', width: 110 },
          { title: 'Gender', field: 'gender', sorter: 'string', width: 130 },
          { title: 'Rating', field: 'rating', formatter: 'star', hozAlign: 'center', width: 130 },
          { title: 'Color', field: 'col', sorter: 'string', width: 130 },
          { title: 'DoB', field: 'dob', sorter: 'date', hozAlign: 'center', width: 130 },
          { title: 'Salary', field: 'salary', sorter: 'number', hozAlign: 'right' },
          { title: 'Address', field: 'address', sorter: 'string', width: 220 },
          { title: 'State', field: 'state', sorter: 'string', width: 130 },
          { title: 'Zip Code', field: 'zip', sorter: 'string', width: 130 },
          { title: 'Progress', field: 'progress', formatter: 'progress', width: 160 },
          { title: 'Completed', field: 'completed', formatter: 'tickCross', hozAlign: 'center', width: 130 }
        ]
      })
    </script>
  </body>
</html>
