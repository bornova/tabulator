<!doctype html>

<html>
  <head>
    <title>Tabulator Test</title>
    <link rel="stylesheet" href="./_examples.css" />
  </head>
  <body>
    <div id="example-table"></div>

    <script type="module">
      import { generateData } from './_exampleData.js'
      import { initializeTestPage, loadExampleTabulator } from './_exampleUtils.js'

      await initializeTestPage()
      const Tabulator = await loadExampleTabulator()

      window.table = new Tabulator('#example-table', {
        data: generateData(), //assign data to table
        height: 600,
        columnDefaults: {
          headerSortTristate: true
        },
        columns: [
          { title: 'Id', field: 'id' },
          { title: 'Name', field: 'name', editor: 'input', headerFilter: 'input', sorter: 'string' },
          {
            title: 'Age',
            field: 'age',
            hozAlign: 'right',
            headerHozAlign: 'right',
            editor: 'number',
            validator: {
              type: 'max',
              parameters: 80
            }
          },
          {
            title: 'Gender',
            field: 'gender',
            sorter: 'string',
            editor: 'list',
            editorParams: { valuesLookup: 'active' }
          },
          { title: 'Rating', field: 'rating', formatter: 'star', editor: true },
          {
            title: 'Color',
            field: 'col',
            sorter: 'string',
            editor: 'input',
            hozAlign: 'center',
            editor: 'list',
            editorParams: { valuesLookup: 'active' }
          },
          { title: 'DoB', field: 'dob', sorter: 'date', hozAlign: 'center' },
          {
            title: 'Salary',
            field: 'salary',
            sorter: 'number',
            hozAlign: 'right',
            editor: 'list',
            editorParams: { valuesLookup: 'active' }
          },
          { title: 'Address', field: 'address', sorter: 'string', editor: 'textarea' },
          {
            title: 'State',
            field: 'state',
            sorter: 'string',
            editor: 'list',
            editorParams: { valuesLookup: 'active', sort: 'asc' }
          },
          {
            title: 'Zip Code',
            field: 'zip',
            editor: 'input',
            editorParams: {
              elementAttributes: {
                maxlength: '5'
              }
            }
          },
          {
            title: 'Progress',
            field: 'progress',
            formatter: 'progress',
            editor: true,
            formatterParams: {
              legend: true
            }
          },
          { title: 'Completed', field: 'completed', formatter: 'tickCross', hozAlign: 'center', editor: true }
        ]
      })
    </script>
  </body>
</html>
