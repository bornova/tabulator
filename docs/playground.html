<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Options Playground — @bornova/tabulator-tables</title>
    <link rel="stylesheet" href="./playground.css" />
    <link rel="stylesheet" href="./tabulator.min.css" />
    <script src="./tabulator.min.js"></script>
  </head>
  <body>
    <span id="rebuild-indicator">✓ Table rebuilt</span>
    <header id="page-header">
      <span id="page-header-brand">
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <rect x="3" y="3" width="18" height="18" rx="2" />
          <path d="M3 9h18M3 15h18M9 9v10M15 9v10" />
        </svg>
        <span id="page-header-title">@bornova/tabulator-tables</span>
        <span id="page-header-subtitle">Playground</span>
      </span>
      <div id="page-header-controls">
        <select id="example-select" aria-label="Load example">
          <option value="">Load example…</option>
          <option value="basic">Basic table</option>
          <option value="pagination">Pagination</option>
          <option value="header-filters">Header filters</option>
          <option value="grouping">Grouping</option>
          <option value="editable">Editable data</option>
          <option value="frozen-cols">Frozen columns</option>
          <option value="frozen-rows">Frozen rows</option>
          <option value="responsive">Responsive layout</option>
          <option value="data-tree">Data tree</option>
          <option value="selectable">Selectable rows</option>
          <option value="movable-rows">Movable rows</option>
          <option value="column-groups">Column groups</option>
          <option value="column-calcs">Column calculations</option>
          <option value="spreadsheet">Spreadsheet</option>
        </select>
        <a
          id="github-btn"
          href="https://github.com/bornova/tabulator"
          target="_blank"
          rel="noopener"
          aria-label="View on GitHub"
        >
          <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.603-3.369-1.342-3.369-1.342-.454-1.154-1.11-1.462-1.11-1.462-.908-.62.069-.607.069-.607 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.203 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.578.688.48C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"
            />
          </svg>
        </a>
        <div id="theme-toggle-header" role="group" aria-label="Theme">
          <button class="theme-btn" data-theme="light dark">Auto</button>
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="dark">Dark</button>
        </div>
      </div>
    </header>
    <div id="playground">
      <aside id="options-sidebar">
        <div class="sidebar-heading">
          <span>Table Options</span>
          <button id="reset-table-btn" class="reset-btn" title="Reset all table options to defaults">↺ Reset</button>
        </div>
        <!-- accordion groups injected by JS -->
      </aside>

      <div id="table-area">
        <div id="example-table-wrap">
          <div id="example-table"></div>
        </div>

        <div id="col-options-section">
          <div id="col-options-header">
            <span id="col-options-header-label">Column Options</span>
            <!-- tabs injected by JS -->
            <button id="col-options-toggle" title="Toggle column options">▼</button>
          </div>
          <div id="col-options-body">
            <!-- column option rows injected by JS -->
          </div>
        </div>

        <div id="config-section">
          <button id="config-toggle"><span>Generated Config</span> <span>▼</span></button>
          <div id="config-body">
            <div id="config-copy-wrap"><button id="config-copy-btn">Copy</button></div>
            <pre id="config-json"></pre>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { generateData, generateNestedData } from './exampleData.js'

      // Theme switcher
      ;(() => {
        let meta = document.querySelector('meta[name="color-scheme"]')
        if (!meta) {
          meta = document.createElement('meta')
          meta.name = 'color-scheme'
          document.head.appendChild(meta)
        }
        const applyTheme = (theme) => {
          meta.content = theme
          localStorage.setItem('tabulator-theme', theme)
          document.querySelectorAll('#theme-toggle-header .theme-btn').forEach((btn) => {
            const active = btn.dataset.theme === theme
            btn.classList.toggle('active', active)
            btn.setAttribute('aria-pressed', active ? 'true' : 'false')
          })
        }
        applyTheme(localStorage.getItem('tabulator-theme') || 'light dark')
        document.getElementById('theme-toggle-header').addEventListener('click', (e) => {
          const btn = e.target.closest('.theme-btn')
          if (btn) applyTheme(btn.dataset.theme)
        })
      })()

      const Tabulator = window.Tabulator

      // Load option schemas
      const [tableSchema, columnSchema] = await Promise.all([
        fetch('./tableSchema.json').then((r) => r.json()),
        fetch('./columnSchema.json').then((r) => r.json())
      ])

      // ═══════════════════════════════════════════
      // Description lookup maps (for tooltips)
      // ═══════════════════════════════════════════

      const tableDescriptions = {}
      for (const cat of tableSchema) {
        for (const opt of cat.options) {
          if (opt.description) tableDescriptions[opt.option] = opt.description
        }
      }

      const colDescriptions = {}
      for (const cat of columnSchema) {
        for (const opt of cat.options) {
          if (opt.description) colDescriptions[opt.option] = opt.description
        }
      }

      // ═══════════════════════════════════════════
      // Persistence helpers
      // ═══════════════════════════════════════════

      const STORAGE_KEY = 'tabulator-playground-config'
      const PRESET_KEY = 'tabulator-playground-preset'

      function saveConfig() {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify({ tableOpts, columnDefs, activeColId, nextColId }))
        } catch (_) {}
      }

      function loadConfig() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY)
          if (!raw) return null
          return JSON.parse(raw)
        } catch (_) {
          return null
        }
      }

      // ═══════════════════════════════════════════
      // State
      // ═══════════════════════════════════════════

      const tableData = generateData(100)
      const tableDataTree = generateNestedData(5, 4, 2)
      const spreadsheetData = [
        [9937, '', '', 7749, 9816, 4355, 8279, '', ''],
        [2380, '', 6977, 8896, 4012, 3803, 5408, 3415, 3056],
        [9180, '', 39, 9445, 3917, '', 18, 5239, 2516],
        [1924, 8734, 1819, 1838, 2330, 7921, 9219, '', 3537],
        ['', 8665, 5875, 9732, 1926, '', 9743, 8388, ''],
        [7040, 4861, 2988, 5584, 2344, 9749, 8872, 9177, 6246],
        [6334, 1674, 2967, '', 9353, 396, 6006, 8572, ''],
        [6359, '', 2580, 5723, 9801, 554, 1044, 5266, 8532],
        [7278, 6971, 2232, 5720, 5665, 7231, 1165, '', 168]
      ]

      // Table-level options (primitives only — no callbacks)
      const tableOpts = {
        // General
        height: 300,
        minHeight: false,
        maxHeight: false,
        tooltipDelay: 300,
        renderVertical: 'virtual',
        renderVerticalBuffer: 0,
        renderHorizontal: 'basic',
        placeholder: '',
        history: false,
        locale: false,
        downloadRowRange: 'active',
        textDirection: 'auto',
        tabEndNewRow: false,
        validationMode: 'blocking',
        debugInvalidOptions: true,
        reactiveData: false,
        // Columns
        autoColumns: false,
        layout: 'fitData',
        layoutColumnsOnNewData: false,
        responsiveLayout: false,
        responsiveLayoutCollapseStartOpen: true,
        responsiveLayoutCollapseUseFormatters: true,
        movableColumns: false,
        columnHeaderVertAlign: 'top',
        scrollToColumnPosition: 'left',
        scrollToColumnIfVisible: true,
        columnCalcs: true,
        nestedFieldSeparator: '.',
        headerVisible: true,
        resizableColumnGuide: false,
        resizableColumnFit: false,
        // Rows
        rowHeight: null,
        addRowPos: 'bottom',
        movableRows: false,
        movableRowsReceiver: 'insert',
        resizableRows: false,
        resizableRowGuide: false,
        scrollToRowPosition: 'top',
        scrollToRowIfVisible: true,
        // Data
        index: 'id',
        ajaxURL: false,
        ajaxConfig: 'GET',
        ajaxContentType: 'form',
        progressiveLoad: false,
        progressiveLoadDelay: 0,
        progressiveLoadScrollMargin: false,
        importFormat: null,
        importReader: 'text',
        filterMode: 'local',
        sortMode: 'local',
        // Sorting
        columnHeaderSortMulti: true,
        sortOrderReverse: false,
        headerSortClickElement: 'header',
        // Filtering
        headerFilterLiveFilterDelay: 300,
        // Row Grouping
        groupBy: false,
        groupStartOpen: true,
        groupToggleElement: 'arrow',
        groupUpdateOnCellEdit: false,
        groupClosedShowCalcs: false,
        // Pagination
        pagination: false,
        paginationMode: 'local',
        paginationSize: 10,
        paginationSizeSelector: false,
        paginationAddRow: 'page',
        paginationButtonCount: 5,
        paginationCounter: false,
        paginationInitialPage: 1,
        // Spreadsheet
        spreadsheet: false,
        spreadsheetRows: 50,
        spreadsheetColumns: 50,
        spreadsheetOutputFull: false,
        spreadsheetSheetTabs: false,
        // Persistent Configuration
        persistence: false,
        persistenceID: null,
        persistenceMode: true,
        // Editing
        editTriggerEvent: 'focus',
        // Selection
        selectableRows: 'highlight',
        selectableRowsRollingSelection: true,
        selectableRowsRangeMode: 'drag',
        selectableRowsPersistence: true,
        selectableRange: false,
        selectableRangeColumns: false,
        selectableRangeClearCells: false,
        selectableRangeAutoFocus: true,
        selectableRangeRows: false,
        // Clipboard
        clipboard: false,
        clipboardCopyStyled: true,
        clipboardCopyConfig: false,
        clipboardCopyRowRange: 'active',
        clipboardPasteAction: 'insert',
        // Data Tree
        dataTree: false,
        dataTreeFilter: true,
        dataTreeSort: true,
        dataTreeElementColumn: false,
        dataTreeBranchElement: true,
        dataTreeChildIndent: 9,
        dataTreeChildField: '_children',
        dataTreeStartExpanded: false,
        dataTreeSelectPropagate: false,
        dataTreeChildColumnCalcs: false,
        // Printing
        printAsHtml: false,
        printStyled: true,
        printRowRange: 'visible'
      }

      // Snapshot of initial defaults for reset
      const DEFAULT_TABLE_OPTS = JSON.parse(JSON.stringify(tableOpts))

      // Tabulator's own default values (from tableSchema.json) — used to filter the generated config
      const TABULATOR_DEFAULTS = {}
      for (const cat of tableSchema) {
        for (const opt of cat.options) {
          if (opt.defaultValue !== undefined) TABULATOR_DEFAULTS[opt.option] = opt.defaultValue
        }
      }

      // Column definitions (includes internal _id for tab tracking)
      let nextColId = 14
      let activeColId
      let rawColumns = null // when set, bypasses resolveColumns() (e.g. column groups)
      let presetExtraOpts = null // non-serialisable options (callbacks) applied directly
      let columnDefs = [
        {
          _id: 1,
          title: 'Id',
          field: 'id',
          sorter: 'number',
          hozAlign: 'right',
          headerHozAlign: 'right',
          resizable: true
        },
        { _id: 2, title: 'Name', field: 'name', sorter: 'string', resizable: true },
        {
          _id: 3,
          title: 'Age',
          field: 'age',
          sorter: 'number',
          hozAlign: 'right',
          headerHozAlign: 'right',
          resizable: true
        },
        { _id: 4, title: 'Gender', field: 'gender', sorter: 'string', resizable: true },
        {
          _id: 5,
          title: 'Rating',
          field: 'rating',
          sorter: 'number',
          formatter: 'star',
          hozAlign: 'center',
          headerHozAlign: 'center',
          resizable: true
        },
        { _id: 6, title: 'Color', field: 'col', sorter: 'string', resizable: true },
        { _id: 7, title: 'DoB', field: 'dob', sorter: 'date', hozAlign: 'center', resizable: true },
        {
          _id: 8,
          title: 'Salary',
          field: 'salary',
          sorter: 'number',
          hozAlign: 'right',
          headerHozAlign: 'right',
          formatter: 'money',
          formatterParams: { decimal: '.', thousand: ',', symbol: '$' },
          resizable: true
        },
        { _id: 9, title: 'Address', field: 'address', sorter: 'string', resizable: true },
        { _id: 10, title: 'State', field: 'state', sorter: 'string', resizable: true },
        { _id: 11, title: 'Zip', field: 'zip', sorter: 'number', resizable: true },
        { _id: 12, title: 'Progress', field: 'progress', sorter: 'number', formatter: 'progress', resizable: true },
        {
          _id: 13,
          title: 'Done',
          field: 'completed',
          sorter: 'boolean',
          formatter: 'tickCross',
          hozAlign: 'center',
          resizable: true
        }
      ]

      // Snapshot of initial column defaults for reset
      const DEFAULT_COLUMN_DEFS = JSON.parse(JSON.stringify(columnDefs))

      // ═══════════════════════════════════════════
      // Restore persisted config (overrides defaults)
      // ═══════════════════════════════════════════

      ;(() => {
        const saved = loadConfig()
        if (!saved) return
        if (saved.tableOpts && typeof saved.tableOpts === 'object') {
          Object.assign(tableOpts, saved.tableOpts)
        }
        if (Array.isArray(saved.columnDefs) && saved.columnDefs.length) {
          // Merge default column properties into saved columns so newly-added
          // defaults (e.g. formatter, formatterParams) are picked up on reload
          const defaultById = Object.fromEntries(columnDefs.map((d) => [d._id, d]))
          columnDefs = saved.columnDefs.map((saved) => {
            const defaults = defaultById[saved._id]
            return defaults ? Object.assign({}, defaults, saved) : saved
          })
        }
        if (typeof saved.nextColId === 'number') nextColId = saved.nextColId
        if (typeof saved.activeColId === 'number') activeColId = saved.activeColId
      })()

      // Default activeColId if not restored
      if (!activeColId) activeColId = columnDefs[0]._id

      // Restore last-used preset key into the dropdown (after DOM ready)
      const _savedPreset = localStorage.getItem(PRESET_KEY) || ''

      // ═══════════════════════════════════════════
      // Option schemas (generated from tableSchema.json / columnSchema.json)
      // ═══════════════════════════════════════════

      // Helpers
      function enumValStr(v) {
        if (v === true) return 'true'
        if (v === false) return 'false'
        return String(v)
      }

      // ── Table options ────────────────────────────────────────────

      // Options to skip in the sidebar (function-only, complex objects, or handled elsewhere)
      const TABLE_OPT_SKIP = new Set([
        'columns',
        'data',
        'columnDefaults',
        'autoColumnsDefinitions',
        'rowFormatter',
        'rowFormatterPrint',
        'rowFormatterClipboard',
        'rowFormatterHtmlOutput',
        'movableRowsConnectedTables',
        'movableRowsSender',
        'movableRowsConnectedElements',
        'movableRowsElementDrop',
        'ajaxParams',
        'ajaxURLGenerator',
        'ajaxRequestFunc',
        'dataSendParams',
        'dataReceiveParams',
        'importFileValidator',
        'importDataValidator',
        'importHeaderTransform',
        'importValueTransform',
        'dataLoader',
        'dataLoaderLoading',
        'dataLoaderError',
        'dataLoaderErrorTimeout',
        'initialSort',
        'initialFilter',
        'initialHeaderFilter',
        'headerSortElement',
        'groupValues',
        'groupHeader',
        'groupHeaderPrint',
        'groupHeaderClipboard',
        'groupHeaderDownload',
        'groupHeaderHtmlOutput',
        'paginationElement',
        'paginationOutOfRange',
        'spreadsheetColumnDefinition',
        'spreadsheetData',
        'spreadsheetSheets',
        'spreadsheetSheetTabsElement',
        'persistenceReaderFunc',
        'persistenceWriterFunc',
        'editorEmptyValue',
        'editorEmptyValueFunc',
        'selectableRowsCheck',
        'selectableRangeClearCellsValue',
        'clipboardCopyFormatter',
        'clipboardPasteParser',
        'dataTreeCollapseElement',
        'dataTreeExpandElement',
        'printConfig',
        'printHeader',
        'printFooter',
        'printFormatter',
        'rowContextMenu',
        'rowClickMenu',
        'rowDblClickMenu',
        'groupContextMenu',
        'groupClickMenu',
        'groupDblClickMenu',
        'rowContextPopup',
        'rowClickPopup',
        'rowDblClickPopup',
        'groupContextPopup',
        'groupClickPopup',
        'groupDblClickPopup',
        'paginationCounterElement',
        'dependencies',
        'downloadConfig',
        'htmlOutputConfig',
        'langs',
        'footerElement',
        'popupContainer',
        'keybindings',
        'responsiveLayoutCollapseFormatter',
        'rowHeader'
      ])

      // Manual extras not present in schema but valid Tabulator options
      const TABLE_OPT_EXTRAS = {}

      // Per-option overrides (custom select values, etc.)
      const TABLE_OPT_OVERRIDES = {
        groupBy: { type: 'select', opts: ['false', 'gender', 'col', 'completed'] },
        selectableRows: { type: 'select', opts: ['highlight', 'true', 'false', '1', '2', '3', '5', '10'] }
      }

      function inferTableOpt(opt) {
        if (TABLE_OPT_SKIP.has(opt.option)) return { key: opt.option, label: opt.option, disabled: true }
        if (TABLE_OPT_OVERRIDES[opt.option])
          return { key: opt.option, label: opt.option, ...TABLE_OPT_OVERRIDES[opt.option] }

        const dt = (opt.dataType || '').toLowerCase()

        if (opt.enum?.length) {
          return {
            key: opt.option,
            type: 'select',
            label: opt.option,
            opts: ['', ...opt.enum.map((e) => enumValStr(e.value))]
          }
        }
        if (dt === 'function' || dt.startsWith('function')) return null
        if (dt === 'boolean') return { key: opt.option, type: 'boolean', label: opt.option }
        if (dt.startsWith('boolean') && !dt.includes('string'))
          return { key: opt.option, type: 'boolean', label: opt.option }
        if (dt.includes('integer')) return { key: opt.option, type: 'number', label: opt.option, min: 0 }
        if (dt.includes('boolean')) return { key: opt.option, type: 'boolean', label: opt.option }
        if (dt === 'string' || (dt.includes('string') && !dt.includes('function')))
          return { key: opt.option, type: 'text', label: opt.option }
        return null
      }

      const tableOptionGroups = tableSchema
        .map((cat) => ({
          label: cat.category,
          open: cat.category === 'General' || cat.category === 'Columns',
          opts: [...cat.options.map(inferTableOpt).filter(Boolean), ...(TABLE_OPT_EXTRAS[cat.category] || [])]
        }))
        .filter((g) => g.opts.length > 0)

      // ── Column options ───────────────────────────────────────────

      // Derive formatter and calc-formatter value lists from schema
      const SYSTEM_FORMATTERS = new Set(['rownum', 'handle', 'rowSelection', 'responsiveCollapse'])
      const FORMATTER_VALUES = (
        columnSchema.flatMap((c) => c.options).find((o) => o.option === 'formatter')?.enum || []
      )
        .map((e) => String(e.value))
        .filter((v) => !SYSTEM_FORMATTERS.has(v))
      const CALC_FORMATTER_VALUES = ['plaintext', 'money', 'datetime', 'tickCross', 'star', 'progress', 'color']

      const COL_OPT_SKIP = new Set([
        // Cell event callbacks
        'cellClick',
        'cellDblClick',
        'cellContext',
        'cellTap',
        'cellDblTap',
        'cellTapHold',
        'cellMouseEnter',
        'cellMouseLeave',
        'cellMouseOver',
        'cellMouseOut',
        'cellMouseMove',
        'cellMouseDown',
        'cellMouseUp',
        'cellEditing',
        'cellEdited',
        'cellEditCancelled',
        // Header event callbacks
        'headerClick',
        'headerDblClick',
        'headerContext',
        'headerTap',
        'headerDblTap',
        'headerTapHold',
        'headerMouseEnter',
        'headerMouseLeave',
        'headerMouseOver',
        'headerMouseOut',
        'headerMouseMove',
        'headerMouseDown',
        'headerMouseUp',
        // Menus / popups
        'contextMenu',
        'clickMenu',
        'dblClickMenu',
        'contextPopup',
        'clickPopup',
        'dblClickPopup',
        'headerMenu',
        'headerClickMenu',
        'headerDblClickMenu',
        'headerContextMenu',
        'headerPopup',
        'headerClickPopup',
        'headerContextPopup',
        'headerDblClickPopup',
        // Mutators / accessors (function-only)
        'mutator',
        'mutatorParams',
        'mutatorData',
        'mutatorDataParams',
        'mutatorEdit',
        'mutatorEditParams',
        'mutatorClipboard',
        'mutatorClipboardParams',
        'mutatorImport',
        'mutatorImportParams',
        'mutateLink',
        'accessor',
        'accessorParams',
        'accessorData',
        'accessorDataParams',
        'accessorDownload',
        'accessorDownloadParams',
        'accessorClipboard',
        'accessorClipboardParams',
        // Other function-only
        'headerFilterEmptyCheck',
        'headerFilterFuncParams',
        'editorEmptyValueFunc'
      ])

      // Column options that need special/overridden handling
      const COL_OPT_OVERRIDES = {
        editorParams: {
          key: 'editorParams',
          type: 'editorParams',
          label: 'editorParams',
          showWhen: (def) => !!def.editor
        },
        editorEmptyValue: {
          key: 'editorEmptyValue',
          type: 'text',
          label: 'editorEmptyValue',
          showWhen: (def) => !!def.editor
        },
        editable: { key: 'editable', type: 'boolean', label: 'editable', default: true },
        tooltip: { key: 'tooltip', type: 'boolean', label: 'tooltip' },
        headerTooltip: { key: 'headerTooltip', type: 'text', label: 'headerTooltip' },
        headerFilter: { key: 'headerFilter', type: 'boolean', label: 'headerFilter' },
        sorterParams: { key: 'sorterParams', type: 'json', label: 'sorterParams' },
        formatterParams: { key: 'formatterParams', type: 'json', label: 'formatterParams' },
        formatterPrint: {
          key: 'formatterPrint',
          type: 'select',
          label: 'formatterPrint',
          opts: ['', ...FORMATTER_VALUES]
        },
        formatterPrintParams: { key: 'formatterPrintParams', type: 'json', label: 'formatterPrintParams' },
        formatterClipboard: {
          key: 'formatterClipboard',
          type: 'select',
          label: 'formatterClipboard',
          opts: ['', ...FORMATTER_VALUES]
        },
        formatterClipboardParams: { key: 'formatterClipboardParams', type: 'json', label: 'formatterClipboardParams' },
        formatterHtmlOutput: {
          key: 'formatterHtmlOutput',
          type: 'select',
          label: 'formatterHtmlOutput',
          opts: ['', ...FORMATTER_VALUES]
        },
        formatterHtmlOutputParams: {
          key: 'formatterHtmlOutputParams',
          type: 'json',
          label: 'formatterHtmlOutputParams'
        },
        titleFormatter: {
          key: 'titleFormatter',
          type: 'select',
          label: 'titleFormatter',
          opts: ['', ...FORMATTER_VALUES]
        },
        titleFormatterParams: { key: 'titleFormatterParams', type: 'json', label: 'titleFormatterParams' },
        topCalcFormatter: {
          key: 'topCalcFormatter',
          type: 'select',
          label: 'topCalcFormatter',
          opts: ['', ...CALC_FORMATTER_VALUES]
        },
        topCalcFormatterParams: { key: 'topCalcFormatterParams', type: 'json', label: 'topCalcFormatterParams' },
        bottomCalcFormatter: {
          key: 'bottomCalcFormatter',
          type: 'select',
          label: 'bottomCalcFormatter',
          opts: ['', ...CALC_FORMATTER_VALUES]
        },
        bottomCalcFormatterParams: {
          key: 'bottomCalcFormatterParams',
          type: 'json',
          label: 'bottomCalcFormatterParams'
        },
        headerFilterPlaceholder: { key: 'headerFilterPlaceholder', type: 'text', label: 'headerFilterPlaceholder' },
        headerFilterParams: { key: 'headerFilterParams', type: 'json', label: 'headerFilterParams' },
        headerFilterLiveFilter: {
          key: 'headerFilterLiveFilter',
          type: 'boolean',
          label: 'headerFilterLiveFilter',
          default: true
        }
      }

      function inferColOpt(opt) {
        if (COL_OPT_SKIP.has(opt.option)) return null
        if (COL_OPT_OVERRIDES[opt.option]) return COL_OPT_OVERRIDES[opt.option]

        const dt = (opt.dataType || '').toLowerCase()

        if (opt.enum?.length) {
          return {
            key: opt.option,
            type: 'select',
            label: opt.option,
            opts: ['', ...opt.enum.map((e) => enumValStr(e.value))]
          }
        }
        if (dt === 'function' || dt.startsWith('function')) return null
        if (dt === 'boolean') return { key: opt.option, type: 'boolean', label: opt.option }
        if (dt.startsWith('boolean') && !dt.includes('string'))
          return { key: opt.option, type: 'boolean', label: opt.option }
        if (dt.includes('integer')) return { key: opt.option, type: 'number', label: opt.option, min: 0 }
        if (dt.includes('boolean')) return { key: opt.option, type: 'boolean', label: opt.option }
        if (dt === 'string' || (dt.includes('string') && !dt.includes('function')))
          return { key: opt.option, type: 'text', label: opt.option }
        if (dt === 'object' || dt.startsWith('object')) return { key: opt.option, type: 'json', label: opt.option }
        return null
      }

      const rawColSchema = columnSchema.flatMap((cat) => [
        { type: 'group', label: cat.category },
        ...cat.options.map(inferColOpt).filter(Boolean)
      ])
      // Remove group headers that have no items after them (all options skipped)
      const columnOptionSchema = rawColSchema.filter((item, i) => {
        if (item.type !== 'group') return true
        for (let j = i + 1; j < rawColSchema.length; j++) {
          if (rawColSchema[j].type === 'group') return false
          return true
        }
        return false
      })

      // ═══════════════════════════════════════════
      // Table build / rebuild
      // ═══════════════════════════════════════════

      let table = null
      let rebuildTimer = null

      function resolveOpts() {
        const out = {}
        for (const [k, v] of Object.entries(tableOpts)) {
          if (v === null || v === undefined || v === '') continue
          // Coerce string 'true'/'false' to booleans (used in select opts for boolean+string mixed options)
          if (v === 'true') {
            out[k] = true
            continue
          }
          if (v === 'false') {
            out[k] = false
            continue
          }
          out[k] = v
        }
        // selectableRows: number strings → numbers
        if (typeof out.selectableRows === 'string' && /^\d+$/.test(out.selectableRows)) {
          out.selectableRows = parseInt(out.selectableRows, 10)
        }
        // rowHeader: omit when false/undefined
        if (out.rowHeader === false || out.rowHeader === undefined) delete out.rowHeader
        return out
      }

      function resolveColumns() {
        return columnDefs.map((def) => {
          const col = {}
          for (const [k, v] of Object.entries(def)) {
            if (k === '_id') continue
            if (v === '' || v === null || v === undefined) continue
            col[k] = v
          }
          return col
        })
      }

      function rebuildTable() {
        if (table) {
          try {
            table.destroy()
          } catch (_) {}
          table = null
        }

        const el = document.getElementById('example-table')
        document.getElementById('col-options-section').style.display = rawColumns ? 'none' : ''

        try {
          const opts = resolveOpts()
          const isSpreadsheet = !!opts.spreadsheet
          table = new Tabulator(el, {
            ...(isSpreadsheet
              ? {
                  spreadsheetData,
                  spreadsheetColumnDefinition: { editor: 'input' },
                  rowHeader: { field: '_id', hozAlign: 'center', headerSort: false, frozen: true },
                  editorEmptyValue: undefined
                }
              : {
                  data: opts.dataTree ? tableDataTree : tableData,
                  columns: rawColumns ?? resolveColumns()
                }),
            ...(presetExtraOpts ?? {}),
            ...opts
          })
        } catch (err) {
          console.error('Tabulator build error:', err)
        }

        updateConfigPreview()
        flashRebuildIndicator()
      }

      function scheduleRebuild() {
        clearTimeout(rebuildTimer)
        rebuildTimer = setTimeout(() => {
          saveConfig()
          rebuildTable()
        }, 450)
      }

      function flashRebuildIndicator() {
        const el = document.getElementById('rebuild-indicator')
        el.classList.add('show')
        clearTimeout(el._t)
        el._t = setTimeout(() => el.classList.remove('show'), 1600)
      }

      // ═══════════════════════════════════════════
      // Input factory
      // ═══════════════════════════════════════════

      function buildInput(schema, currentVal, onChange) {
        if (schema.type === 'boolean') {
          const el = document.createElement('input')
          el.type = 'checkbox'
          const resolvedVal = currentVal !== undefined ? currentVal : (schema.default ?? false)
          el.checked = !!resolvedVal
          el.addEventListener('change', () => onChange(el.checked))
          return el
        }

        if (schema.type === 'select') {
          const el = document.createElement('select')
          schema.opts.forEach((o) => {
            const opt = document.createElement('option')
            opt.value = o
            opt.textContent = o === '' ? '(none)' : o
            const cur = currentVal === false ? 'false' : currentVal === true ? 'true' : String(currentVal ?? '')
            if (cur === o) opt.selected = true
            el.appendChild(opt)
          })
          el.addEventListener('change', () => {
            let v = el.value
            if (v === 'true') v = true
            else if (v === 'false') v = false
            onChange(v)
          })
          return el
        }

        if (schema.type === 'number') {
          const el = document.createElement('input')
          el.type = 'number'
          if (schema.min !== undefined) el.min = schema.min
          el.value = currentVal ?? ''
          el.placeholder = '(default)'
          el.addEventListener('change', () => {
            onChange(el.value === '' ? undefined : Number(el.value))
          })
          return el
        }

        // text
        if (schema.type === 'json') {
          const el = document.createElement('input')
          el.type = 'text'
          el.value = currentVal !== undefined && currentVal !== false ? JSON.stringify(currentVal) : ''
          el.placeholder = '(default)'
          el.addEventListener('change', () => {
            const raw = el.value.trim()
            if (raw === '') {
              onChange(undefined)
              return
            }
            try {
              onChange(JSON.parse(raw))
            } catch (_) {
              try {
                // Accept JS object literal syntax (e.g. unquoted keys)
                onChange(Function('return (' + raw + ')')())
              } catch (_2) {
                el.style.outlineColor = '#dc2626'
                el.title = 'Invalid value'
              }
            }
          })
          el.addEventListener('input', () => {
            el.style.outlineColor = ''
            el.title = ''
          })
          return el
        }

        // text
        const el = document.createElement('input')
        el.type = 'text'
        el.value = currentVal ?? ''
        el.placeholder = '(default)'
        el.addEventListener('change', () => onChange(el.value))
        return el
      }

      // ═══════════════════════════════════════════
      // Sidebar: table options
      // ═══════════════════════════════════════════

      function buildSidebar() {
        const sidebar = document.getElementById('options-sidebar')
        sidebar.querySelectorAll('.opt-group').forEach((el) => el.remove())

        tableOptionGroups.forEach((group) => {
          const details = document.createElement('details')
          details.className = 'opt-group'
          if (group.open) details.open = true

          const summary = document.createElement('summary')
          summary.textContent = group.label
          details.appendChild(summary)

          const body = document.createElement('div')
          body.className = 'opt-group-body'

          group.opts.forEach((schema) => {
            const row = document.createElement('div')
            row.className = 'opt-row' + (schema.disabled ? ' disabled' : '')

            const label = document.createElement('span')
            label.className = 'opt-label'
            label.textContent = schema.label ?? schema.key
            label.title = tableDescriptions[schema.key] || schema.key
            row.appendChild(label)

            if (!schema.disabled) {
              const wrap = document.createElement('span')
              wrap.className = 'opt-input'
              wrap.appendChild(
                buildInput(schema, tableOpts[schema.key], (val) => {
                  tableOpts[schema.key] = val
                  scheduleRebuild()
                })
              )
              row.appendChild(wrap)
            }

            body.appendChild(row)
          })

          details.appendChild(body)
          sidebar.appendChild(details)
        })
      }

      // ═══════════════════════════════════════════
      // Column option tabs + panel
      // ═══════════════════════════════════════════

      function renderColumnTabs() {
        const header = document.getElementById('col-options-header')
        const toggleBtn = document.getElementById('col-options-toggle')

        // Remove existing tabs (keep the label span and any non-tab children)
        header.querySelectorAll('.col-tab, #add-col-btn').forEach((el) => el.remove())

        columnDefs.forEach((def) => {
          const tab = document.createElement('button')
          tab.className = 'col-tab' + (def._id === activeColId ? ' active' : '')
          tab.textContent = def.title || def.field || `Col ${def._id}`
          tab.addEventListener('click', () => {
            activeColId = def._id
            saveConfig()
            renderColumnTabs()
            renderColumnOptionsBody()
          })
          header.insertBefore(tab, toggleBtn)
        })

        const addBtn = document.createElement('button')
        addBtn.id = 'add-col-btn'
        addBtn.textContent = '+ Add Column'
        addBtn.addEventListener('click', addColumn)
        header.insertBefore(addBtn, toggleBtn)
      }

      function renderColumnOptionsBody() {
        const body = document.getElementById('col-options-body')
        body.innerHTML = ''

        const def = columnDefs.find((d) => d._id === activeColId)
        if (!def) return

        // Button row (spans full width)
        const btnRow = document.createElement('div')
        btnRow.id = 'col-opts-btn-row'
        btnRow.style.gridColumn = '1 / -1'

        const resetColBtn = document.createElement('button')
        resetColBtn.id = 'reset-col-opts-btn'
        resetColBtn.textContent = '↺ Reset column'
        resetColBtn.title = 'Reset all column options to defaults'
        resetColBtn.addEventListener('click', () => {
          const original = DEFAULT_COLUMN_DEFS.find((d) => d._id === def._id)
          // Remove all keys then restore from original default (or just keep _id/title/field)
          Object.keys(def).forEach((k) => {
            if (k !== '_id') delete def[k]
          })
          const base = original
            ? JSON.parse(JSON.stringify(original))
            : { _id: def._id, title: def.title, field: def.field }
          Object.assign(def, base)
          renderColumnOptionsBody()
          scheduleRebuild()
        })
        btnRow.appendChild(resetColBtn)

        const removeBtn = document.createElement('button')
        removeBtn.id = 'remove-col-btn'
        removeBtn.textContent = '✕ Remove this column'
        removeBtn.addEventListener('click', () => {
          const idx = columnDefs.findIndex((d) => d._id === activeColId)
          if (idx !== -1) columnDefs.splice(idx, 1)
          activeColId = columnDefs[0]?._id
          renderColumnTabs()
          renderColumnOptionsBody()
          scheduleRebuild()
        })
        btnRow.appendChild(removeBtn)

        body.appendChild(btnRow)

        columnOptionSchema.forEach((schema) => {
          if (schema.type === 'group') {
            const hdr = document.createElement('div')
            hdr.className = 'col-opt-group'
            hdr.textContent = schema.label
            body.appendChild(hdr)
            return
          }

          if (schema.showWhen && !schema.showWhen(def)) return

          if (schema.key === 'editorParams') {
            const section = document.createElement('div')
            section.className = 'editor-params-section'

            const heading = document.createElement('div')
            heading.className = 'editor-params-heading'
            heading.textContent = 'editorParams'
            section.appendChild(heading)

            const editorType = def.editor || ''
            const paramSchemas = editorParamsSchemas[editorType]

            if (!editorType || !paramSchemas) {
              const empty = document.createElement('span')
              empty.className = 'editor-params-empty'
              empty.textContent = editorType ? 'No params for this editor' : 'Select an editor to configure params'
              section.appendChild(empty)
            } else if (paramSchemas.length === 0) {
              const empty = document.createElement('span')
              empty.className = 'editor-params-empty'
              empty.textContent = 'No configurable params for this editor'
              section.appendChild(empty)
            } else {
              const grid = document.createElement('div')
              grid.className = 'editor-params-grid'
              paramSchemas.forEach((paramSchema) => {
                const row = document.createElement('div')
                row.className = 'col-opt-row'
                const label = document.createElement('span')
                label.className = 'col-opt-label'
                label.textContent = paramSchema.label ?? paramSchema.key
                label.title = colDescriptions[paramSchema.key] || paramSchema.key
                row.appendChild(label)
                const wrap = document.createElement('span')
                wrap.className = 'col-opt-input'
                const currentParamVal = (def.editorParams || {})[paramSchema.key]
                wrap.appendChild(
                  buildInput(paramSchema, currentParamVal, (val) => {
                    if (!def.editorParams) def.editorParams = {}
                    if (val === undefined || val === '') {
                      delete def.editorParams[paramSchema.key]
                      if (Object.keys(def.editorParams).length === 0) delete def.editorParams
                    } else {
                      def.editorParams[paramSchema.key] = val
                    }
                    scheduleRebuild()
                  })
                )
                row.appendChild(wrap)
                grid.appendChild(row)
              })
              section.appendChild(grid)
            }

            body.appendChild(section)
            return
          }

          const row = document.createElement('div')
          row.className = 'col-opt-row'

          const label = document.createElement('span')
          label.className = 'col-opt-label'
          label.textContent = schema.label ?? schema.key
          label.title = colDescriptions[schema.key] || schema.key
          row.appendChild(label)

          const wrap = document.createElement('span')
          wrap.className = 'col-opt-input'
          const currentVal = def[schema.key] !== undefined ? def[schema.key] : schema.default
          wrap.appendChild(
            buildInput(schema, currentVal, (val) => {
              def[schema.key] = val
              if (schema.key === 'title') renderColumnTabs()
              if (schema.key === 'editor') {
                delete def.editorParams
                renderColumnOptionsBody()
              }
              scheduleRebuild()
            })
          )
          row.appendChild(wrap)
          body.appendChild(row)
        })
      }

      function addColumn() {
        const id = ++nextColId
        columnDefs.push({
          _id: id,
          title: `New Column ${id}`,
          field: '',
          sorter: 'string',
          resizable: true,
          headerSort: true
        })
        activeColId = id
        renderColumnTabs()
        renderColumnOptionsBody()
        scheduleRebuild()
      }

      // ═══════════════════════════════════════════
      // Config preview
      // ═══════════════════════════════════════════

      function updateConfigPreview() {
        const body = document.getElementById('config-body')
        if (!body.classList.contains('open')) return
        const resolved = resolveOpts()
        const cfg = {}
        for (const [k, v] of Object.entries(resolved)) {
          if (k in TABULATOR_DEFAULTS && JSON.stringify(v) === JSON.stringify(TABULATOR_DEFAULTS[k])) continue
          cfg[k] = v
        }
        if (presetExtraOpts) {
          Object.assign(cfg, presetExtraOpts)
        }
        cfg.columns = resolveColumns()
        const fnReplacer = (_key, val) => (typeof val === 'function' ? val.toString() : val)
        document.getElementById('config-json').textContent = JSON.stringify(cfg, fnReplacer, 2)
      }

      document.getElementById('col-options-toggle').addEventListener('click', () => {
        const section = document.getElementById('col-options-section')
        const collapsed = section.classList.toggle('collapsed')
        document.getElementById('col-options-toggle').textContent = collapsed ? '▲' : '▼'
      })

      document.getElementById('config-copy-btn').addEventListener('click', () => {
        const text = document.getElementById('config-json').textContent
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById('config-copy-btn')
          btn.textContent = 'Copied!'
          setTimeout(() => {
            btn.textContent = 'Copy'
          }, 1500)
        })
      })

      document.getElementById('config-toggle').addEventListener('click', function (e) {
        if (e.target.closest('#config-copy-btn')) return
        const body = document.getElementById('config-body')
        const open = body.classList.toggle('open')
        this.querySelector('span:last-of-type').textContent = open ? '▲' : '▼'
        if (open) updateConfigPreview()
      })

          columnDefs: BASE_COLUMNS
        },
        'column-groups': {
          label: 'Column groups',
          tableOpts: { height: 300, columnHeaderVertAlign: 'bottom' },
          rawColumns: [
            {
              title: 'Name',
              columns: [
                { title: 'Id', field: 'id', sorter: 'number', resizable: true },
                { title: 'Name', field: 'name', sorter: 'string', resizable: true }
              ]
            },
            {
              title: 'Demographics',
              columns: [
                { title: 'Age', field: 'age', sorter: 'number', hozAlign: 'right', resizable: true },
                { title: 'Gender', field: 'gender', sorter: 'string', resizable: true },
                {
                  title: 'Rating',
                  field: 'rating',
                  sorter: 'number',
                  formatter: 'star',
                  hozAlign: 'center',
                  resizable: true
                },
                { title: 'Color', field: 'col', sorter: 'string', resizable: true },
                { title: 'DoB', field: 'dob', sorter: 'date', hozAlign: 'center', resizable: true },
                {
                  title: 'Salary',
                  field: 'salary',
                  sorter: 'number',
                  hozAlign: 'right',
                  formatter: 'money',
                  formatterParams: { decimal: '.', thousand: ',', symbol: '$' },
                  resizable: true
                }
              ]
            },
            {
              title: 'Location',
              columns: [
                { title: 'Address', field: 'address', sorter: 'string', resizable: true },
                { title: 'State', field: 'state', sorter: 'string', resizable: true },
                { title: 'Zip', field: 'zip', sorter: 'number', resizable: true }
              ]
            },
            {
              title: 'Status',
              columns: [
                { title: 'Progress', field: 'progress', sorter: 'number', formatter: 'progress', resizable: true },
                {
                  title: 'Done',
                  field: 'completed',
                  sorter: 'boolean',
                  formatter: 'tickCross',
                  hozAlign: 'center',
                  resizable: true
                }
              ]
            }
          ]
        },
        'column-calcs': {
          label: 'Column calculations',
          tableOpts: {
            height: 300,
            layout: 'fitDataFill',
            renderHorizontal: 'virtual',
            pagination: true,
            paginationMode: 'local',
            paginationSize: 25,
            paginationSizeSelector: true,
            paginationCounter: 'rows',
            movableColumns: true
          },
          columnDefs: BASE_COLUMNS.map((c) => {
            const col = { ...c }
            if (c.field === 'age') {
              col.bottomCalc = 'min'
              col.topCalc = 'max'
            }
            if (c.field === 'salary') {
              col.bottomCalc = 'avg'
              col.bottomCalcFormatter = 'money'
              col.bottomCalcFormatterParams = { decimal: '.', thousand: ',', symbol: '$' }
            }
            return col
          })
        },
        spreadsheet: {
          label: 'Spreadsheet',
          tableOpts: {
            height: 300,
            spreadsheet: true,
            spreadsheetRows: 20,
            spreadsheetColumns: 9,
            spreadsheetSheetTabs: false
          },
          columnDefs: null // spreadsheet mode uses its own data
        }
      }

      function loadPreset(key) {
        const preset = EXAMPLES[key]
        if (!preset) return

        // Reset table options to defaults then apply preset overrides
        Object.keys(tableOpts).forEach((k) => delete tableOpts[k])
        Object.assign(tableOpts, DEFAULT_TABLE_OPTS, preset.tableOpts)

        // Handle raw column groups (bypasses column editor)
        if (preset.rawColumns) {
          rawColumns = preset.rawColumns
          columnDefs = JSON.parse(JSON.stringify(DEFAULT_COLUMN_DEFS))
          nextColId = 14
          activeColId = columnDefs[0]._id
        } else {
          rawColumns = null
          // Reset column defs
          if (preset.columnDefs) {
            columnDefs = JSON.parse(JSON.stringify(preset.columnDefs))
            nextColId = columnDefs.reduce((max, c) => Math.max(max, c._id), 0) + 1
            activeColId = columnDefs[0]._id
          } else {
            columnDefs = JSON.parse(JSON.stringify(DEFAULT_COLUMN_DEFS))
            nextColId = 14
            activeColId = columnDefs[0]._id
          }
        }

        presetExtraOpts = preset.extraOpts ?? null

        localStorage.removeItem(STORAGE_KEY)
        buildSidebar()
        renderColumnTabs()
        renderColumnOptionsBody()
        rebuildTable()

        localStorage.setItem(PRESET_KEY, key)
        document.getElementById('example-select').value = key
      }

      document.getElementById('example-select').addEventListener('change', (e) => {
        if (e.target.value) loadPreset(e.target.value)
      })

      // ═══════════════════════════════════════════
      // Init
      // ═══════════════════════════════════════════

      document.getElementById('reset-table-btn').addEventListener('click', () => {
        Object.keys(tableOpts).forEach((k) => delete tableOpts[k])
        Object.assign(tableOpts, DEFAULT_TABLE_OPTS)
        rawColumns = null
        presetExtraOpts = null
        localStorage.removeItem(STORAGE_KEY)
        localStorage.removeItem(PRESET_KEY)
        document.getElementById('example-select').value = ''
        buildSidebar()
        renderColumnTabs()
        renderColumnOptionsBody()
        scheduleRebuild()
      })

      if (_savedPreset && _savedPreset in EXAMPLES) {
        loadPreset(_savedPreset)
      } else {
        buildSidebar()
        renderColumnTabs()
        renderColumnOptionsBody()
        rebuildTable()
      }
    </script>
  </body>
</html>
